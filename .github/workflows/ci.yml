name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-22.04
            compiler: clang
            cc: clang-15
            cxx: clang++-15
          - os: macos-14
            compiler: clang
            cc: clang
            cxx: clang++

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 12
        if: matrix.os == 'ubuntu-22.04' && matrix.compiler == 'gcc'
        run: sudo apt-get install -y gcc-12 g++-12

      - name: Install Clang 15
        if: matrix.os == 'ubuntu-22.04' && matrix.compiler == 'clang'
        run: sudo apt-get install -y clang-15

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Run examples
        run: |
          ./build/example_matching
          ./build/example_counting
